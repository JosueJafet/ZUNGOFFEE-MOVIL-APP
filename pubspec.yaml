name: zungofee_mobile
description: "Zungofee Mobile — Enterprise Mobile Application for Coffee Warehouse Management"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Gestión de estado oficial (doc 02, sección 11)
  flutter_riverpod: ^2.5.1

  # Cliente HTTP oficial (doc 03, ADR-005)
  dio: ^5.4.3

  # Navegación oficial (doc 03, ADR-004)
  go_router: ^14.2.0

  # Almacenamiento seguro reservado para secretos que no sean la sesión de
  # Supabase (esta ya persiste y refresca su propio JWT automáticamente).
  flutter_secure_storage: ^9.2.2

  # Modelos y serialización (doc 02, sección 19)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  intl: ^0.19.0

  cupertino_icons: ^1.0.8

  # Autenticación (Supabase Auth) — CONTEXTO-MOVIL-FLUTTER.md, sección 4
  supabase_flutter: ^2.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
